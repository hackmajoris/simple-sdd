name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            src/commands/simple-sdd-setup.md
            src/commands/simple-sdd-feature-new.md
            src/commands/simple-sdd-feature-implement.md
            src/commands/simple-sdd-feature-update.md
            src/commands/simple-sdd-feature-complete.md
            src/commands/simple-sdd-feature-status.md
            src/commands/simple-sdd-constitution-sync.md
            src/commands/simple-sdd-help.md
            src/templates/plan-template.md
          generate_release_notes: true
