name: Test Installer

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'src/commands/**'
      - 'src/templates/**'
      - '.github/workflows/test-install.yml'
  push:
    branches: [master, main]
    paths:
      - 'install.sh'
      - 'src/commands/**'
      - 'src/templates/**'
      - '.github/workflows/test-install.yml'

jobs:
  # Matrix: every supported OS × tool × scenario combination.
  install:
    name: ${{ matrix.os }} / ${{ matrix.tool }} / ${{ matrix.scenario }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        tool: [claude, copilot, opencode]
        scenario: [fresh, reinstall]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sdd-release"
          cp install.sh "$RUNNER_TEMP/sdd-release/"
          cp src/commands/*.md "$RUNNER_TEMP/sdd-release/"
          cp src/templates/*.md "$RUNNER_TEMP/sdd-release/"

      - name: Create test project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/test-project"
          cd "$RUNNER_TEMP/test-project"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"

      - name: Install (fresh)
        shell: bash
        env:
          SDD_BASE_URL: file://${{ runner.temp }}/sdd-release
          SDD_VERSION: test
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          bash "$GITHUB_WORKSPACE/install.sh" --tool "${{ matrix.tool }}" --yes

      - name: Re-install (for reinstall scenario)
        if: matrix.scenario == 'reinstall'
        shell: bash
        env:
          SDD_BASE_URL: file://${{ runner.temp }}/sdd-release
          SDD_VERSION: test
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          bash "$GITHUB_WORKSPACE/install.sh" --tool "${{ matrix.tool }}" --yes

      - name: Assert expected files exist
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          case "${{ matrix.tool }}" in
            claude)
              expected_dir=".claude/commands"
              expected_tmpl=".claude/templates/plan-template.md"
              expected_cfg=".claude/CLAUDE.md"
              expected_ext=".md"
              ;;
            copilot)
              expected_dir=".github/prompts"
              expected_tmpl=".github/prompts/plan-template.md"
              expected_cfg=".github/copilot-instructions.md"
              expected_ext=".prompt.md"
              ;;
            opencode)
              expected_dir=".opencode/commands"
              expected_tmpl=".opencode/templates/plan-template.md"
              expected_cfg="RULES.md"
              expected_ext=".md"
              ;;
          esac

          for cmd in simple-sdd-setup simple-sdd-feature-new simple-sdd-feature-implement \
                     simple-sdd-feature-update simple-sdd-feature-complete simple-sdd-feature-abandon \
                     simple-sdd-feature-status simple-sdd-constitution-sync simple-sdd-help; do
            test -f "$expected_dir/${cmd}${expected_ext}" || { echo "Missing: $expected_dir/${cmd}${expected_ext}"; exit 1; }
          done
          test -f "$expected_tmpl" || { echo "Missing template: $expected_tmpl"; exit 1; }
          test -f "$expected_cfg" || { echo "Missing config: $expected_cfg"; exit 1; }
          echo "All expected files present."

      - name: Assert version stamp is present
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          case "${{ matrix.tool }}" in
            claude) f=".claude/commands/simple-sdd-setup.md" ;;
            copilot) f=".github/prompts/simple-sdd-setup.prompt.md" ;;
            opencode) f=".opencode/commands/simple-sdd-setup.md" ;;
          esac
          head -1 "$f" | grep -q '<!-- simple-sdd: test -->' || {
            echo "Version stamp missing or wrong in $f:"
            head -1 "$f"
            exit 1
          }

      - name: Assert config injection appears exactly once
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          case "${{ matrix.tool }}" in
            claude) cfg=".claude/CLAUDE.md" ;;
            copilot) cfg=".github/copilot-instructions.md" ;;
            opencode) cfg="RULES.md" ;;
          esac
          count=$(grep -c '<!-- simple-sdd -->' "$cfg" || true)
          if [ "$count" != "1" ]; then
            echo "Expected exactly 1 simple-sdd block in $cfg, found $count:"
            cat "$cfg"
            exit 1
          fi
          echo "Config injection count OK ($count)."

      - name: Uninstall
        shell: bash
        env:
          SDD_BASE_URL: file://${{ runner.temp }}/sdd-release
          SDD_VERSION: test
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          bash "$GITHUB_WORKSPACE/install.sh" --uninstall --tool "${{ matrix.tool }}" --yes

      - name: Assert files are gone after uninstall
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/test-project"
          case "${{ matrix.tool }}" in
            claude) expected_dir=".claude/commands"; cfg=".claude/CLAUDE.md" ;;
            copilot) expected_dir=".github/prompts"; cfg=".github/copilot-instructions.md" ;;
            opencode) expected_dir=".opencode/commands"; cfg="RULES.md" ;;
          esac
          if ls "$expected_dir"/simple-sdd-* 2>/dev/null | grep -q simple-sdd; then
            echo "Uninstall did not remove command files:"
            ls "$expected_dir"
            exit 1
          fi
          if [ -f "$cfg" ] && grep -q '<!-- simple-sdd -->' "$cfg"; then
            echo "Uninstall did not strip injection block from $cfg:"
            cat "$cfg"
            exit 1
          fi
          if ls "$expected_dir"/*.bak 2>/dev/null | grep -q .bak; then
            echo "Leftover .bak files:"; ls "$expected_dir"; exit 1
          fi
          echo "Uninstall cleaned up as expected."

  # Dry-run should never touch disk, on any platform, even under dash.
  dry-run-portability:
    name: dry-run portability (${{ matrix.shell }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, dash]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dash
        if: matrix.shell == 'dash'
        run: sudo apt-get update && sudo apt-get install -y dash

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sdd-release"
          cp install.sh "$RUNNER_TEMP/sdd-release/"
          cp src/commands/*.md "$RUNNER_TEMP/sdd-release/"
          cp src/templates/*.md "$RUNNER_TEMP/sdd-release/"

      - name: Run dry-run
        env:
          SDD_BASE_URL: file://${{ runner.temp }}/sdd-release
          SDD_VERSION: test
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dryrun-project"
          cd "$RUNNER_TEMP/dryrun-project"
          git init -q
          # install.sh uses bash features; under dash we invoke bash explicitly
          # (this is still a useful canary for accidental non-POSIX-reachable paths).
          bash "$GITHUB_WORKSPACE/install.sh" --dry-run --tool all --yes
          # Assert no files were created:
          created=$(find . -type f ! -path './.git/*' | wc -l | tr -d ' ')
          if [ "$created" != "0" ]; then
            echo "Dry-run wrote $created file(s):"
            find . -type f ! -path './.git/*'
            exit 1
          fi
          echo "Dry-run is clean."
